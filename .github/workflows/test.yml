name: Test our build

on:
  push:
    branches: [ main, rc ]
  pull_request:
    branches: [ main, rc ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
      - name: Install Protoc
        uses: arduino/setup-protoc@v3
      - name: Test build
        run: |
          cd my-service-bus
          cargo test
